---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app ntfy
spec:
  interval: 30m
  maxHistory: 3
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  uninstall:
    keepHistory: false
  values:
    defaultPodOptions:
      automountServiceAccountToken: false
    controllers:
      ntfy:
        annotations:
          reloader.stakater.com/auto: "true"
        strategy: Recreate
        pod:
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
        containers:
          app:
            args: ["serve"]
            image:
              repository: binwiederhier/ntfy
              tag: v2.19.1
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 256Mi
    service:
      app:
        controller: ntfy
        ports:
          http:
            port: 8080
    route:
      app:
        annotations:
          external-dns.alpha.kubernetes.io/target: "ingress-cf.${SECRET_DOMAIN_2}"
        hostnames:
          - ntfy.${SECRET_DOMAIN_3}
        parentRefs:
          - name: envoy
            namespace: networking
            sectionName: https3
        rules:
          - backendRefs:
              - name: ntfy
                port: 8080

    persistence:
      attachments:
        type: emptyDir
        globalMounts:
          - path: /var/cache/ntfy/attachments
            readOnly: false
      server-yml:
        type: configMap
        name: ntfy-server-config
        globalMounts:
          - path: /etc/ntfy/server.yml
            subPath: server.yml
            readOnly: true
      data:
        enabled: true
        existingClaim: ntfy-data
        advancedMounts:
          ntfy:
            app:
              - path: /data
