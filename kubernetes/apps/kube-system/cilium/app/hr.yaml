---
apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: cilium
  namespace: kube-system
spec:
  interval: 5m
  upgrade:
    remediation:
      remediateLastFailure: true
      retries: 5
      strategy: rollback
  install:
    createNamespace: true
    remediation:
      retries: 2
  chart:
    spec:
      chart: cilium
      version: 1.17.3
      sourceRef:
        kind: HelmRepository
        name: cilium-charts
        namespace: flux-system
      interval: 5m
  values:
    cgroup:
      automount:
        enabled: false
      hostRoot: /sys/fs/cgroup

    cluster:
      name: oracle
      id: 10

    envoy:
      enabled: false


    k8sServiceHost: "127.0.0.1"
    k8sServicePort: 7445
    rollOutCiliumPods: true
    localRedirectPolicy: true
    autoDirectNodeRoutes: true
    kubeProxyReplacement: true
    kubeProxyReplacementHealthzBindAddr: 0.0.0.0:10256
    loadBalancer:
      algorithm: "maglev"
      mode: "dsr"

    routingMode: "native"
    ipv4NativeRoutingCIDR: "10.50.0.0/16"
    ipv6NativeRoutingCIDR: "fdd5:67d:98f5:a0::/60"

    ipam:
      mode: "kubernetes"
    ipv6:
      enabled: true
    securityContext:
      capabilities:
        ciliumAgent:
          - CHOWN
          - KILL
          - NET_ADMIN
          - NET_RAW
          - IPC_LOCK
          - SYS_ADMIN
          - SYS_RESOURCE
          - DAC_OVERRIDE
          - FOWNER
          - SETGID
          - SETUID
        cleanCiliumState:
          - NET_ADMIN
          - SYS_ADMIN
          - SYS_RESOURCE

