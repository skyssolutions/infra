apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app odoo
  namespace: default
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  maxHistory: 3
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: uninstall
      retries: 3
  uninstall:
    keepHistory: false
  values:
    defaultPodOptions:
      securityContext:
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 568
        fsGroupChangePolicy: "OnRootMismatch"
    controllers:
      odoo:
        type: deployment
        annotations:
          reloader.stakater.com/auto: "true"

        containers:
          odoo:
            image:
              repository: docker.io/odoo
              tag: 17.0-20251222
            envFrom:
              - secretRef:
                  name: odoo-secrets
          code:
            image:
              repository: ghcr.io/coder/code-server
              tag: 4.105.1
            env:
              TZ: "Europe/Helsinki"
            args:
              - --user-data-dir
              - "/tmp/.vscode"
              - --extensions-dir
              - "/tmp/.vscode"
              - --port
              - "8081"
              - "/mnt/extra-addons"


    service:
      main:
        controller: odoo
        type: ClusterIP
        ports:
          http:
            port: 8069
      code:
        controller: odoo
        type: ClusterIP
        ports:
          http:
            port: 8081

    route:
      app:
        annotations:
          external-dns.alpha.kubernetes.io/target: "ingress-cf.${SECRET_DOMAIN_2}"
        hostnames:
          - "erp.${SECRET_DOMAIN_2}"
        parentRefs:
          - name: envoy
            namespace: networking
            sectionName: https
        rules:
          - backendRefs:
              - name: main
                port: 8069
            filters:
              - type: RequestHeaderModifier
                requestHeaderModifier:
                  add:
                    - name: "X-Forwarded-Proto"
                      value: "https"
                    - name: "X-Forwarded-Host"
                      value: "erp.${SECRET_DOMAIN_2}"

    persistence:
      config:
        existingClaim: odoo-config
        globalMounts:
         - path: /var/lib/odoo
      etc-config-file:
        type: configMap
        name: odoo-configmap
        globalMounts:
          - path: /etc/odoo/odoo.conf
            subPath: odoo.conf
      extra-addons:
        existingClaim: odoo-addons-v1
        globalMounts:
          - path: /mnt/extra-addons
