# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: envoy-app
  namespace: flux-system
spec:
  targetNamespace: networking
  interval: 10m
  path: "./kubernetes/apps/networking/envoy/app"
  prune: true
  wait: false
  sourceRef:
    kind: GitRepository
    name: flux-system
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: envoy-gateway
  namespace: flux-system
spec:
  dependsOn:
    - name: envoy-app
      namespace: flux-system
  targetNamespace: networking
  interval: 10m
  path: "./kubernetes/apps/networking/envoy/gateway"
  prune: true
  wait: false
  sourceRef:
    kind: GitRepository
    name: flux-system
